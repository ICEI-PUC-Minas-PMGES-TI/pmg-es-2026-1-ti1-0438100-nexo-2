<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desenvolvimento de Interfaces Web | Login de Usuário</title>
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/cadastro_denuncia_login.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
</head>

<body>

  <div class="login-page">

    <div class="top-links">
      <a href="#">Mudar para versão pessoal</a>
      <a href="#">Mudar para versão empresa</a>
      <a href="#">Mudar para versão da prefeitura</a>
    </div>

    <div class="login-left">
      <img src="/assets/images/logo.png" alt="Logo" class="logo">

      <h1>Bem vindo de volta.</h1>

      <p>Acesse o site com a sua conta já cadastrada.</p>
    </div>

    <div class="login-right">

      <form id="login-form" onsubmit="processaFormLogin(event)">

        <h2>Login</h2>
        <div id="mensagem" class="alert alert-danger d-none" role="alert"></div>

        <div class="form-group">
          <label for="username">Login:</label>
          <input type="text" id="username" class="form-control">
        </div>

        <div class="form-group">
          <label for="password">Senha:</label>
          <input type="password" id="password" class="form-control">
        </div>

        <div class="btn-area mt-3">
          <input type="submit" value="ENTRAR">
        </div>

      </form>

    </div>

  </div>

  <script src="/../../assets/js/login.js"></script>

</body>

</html>
