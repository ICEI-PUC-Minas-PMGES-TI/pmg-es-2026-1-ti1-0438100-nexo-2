<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastro.css">
    <link rel="stylesheet" href="geral.css">
    <title>Document</title>
</head>

<body>
    <main class="conteudo-site">
        <aside class="boas-vindas">
            <h1>Seja <br> Bem-Vindo.</h1>
            <p>Acesse o site com sua conta cadastrada</p>
            <button id="entrar" class="btn-entrar">Entrar</button>
        </aside>
        <section class="main-content">
            <div class="trocar-tipo">
                <p><a href="cadastroUsuario.html">Mudar para versão do usuário</a></p>
                <p><a href="cadastroPrefeitura.html">Mudar para versão da prefeitura</a></p>
            </div>
            <div class="formulario">
                <h2 id="tituloFormulario">Crie sua conta</h2>
                <form id="formCadastro">
                    <input type="hidden" id="idEdicao">
                    <div>
                        <label for="nome">Nome Completo:</label> <br>
                        <input type="text" id="nome" name="nome" placeholder="Ex: João da Silva" required>
                    </div>
                    <div>
                        <label for="email">Email:</label> <br>
                        <input type="email" id="email" name="email" placeholder="email@exemplo.com" required>
                    </div>
                    <div>
                        <label for="identificador">CPF:</label> <br>
                        <!-- ID alterado para "identificador" para unificar captura do JS -->
                        <input type="text" id="identificador" name="cpf" placeholder="12345678901" required>
                    </div>
                    <div>
                        <label for="senha">Senha:</label> <br>
                        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                    </div>
                    <div>
                        <label for="confirmarSenha">Confirme sua senha:</label> <br>
                        <input type="password" id="confirmarSenha" name="confirmeSenha" placeholder="Confirme sua senha" required>
                    </div>
                    <button id="cadastroUsuario">Cadastrar</button>
                </form>
            </div>

            <div class="gerenciamento-contas">
                <h3>Contas de Empresa Cadastradas</h3>
                <div class="tabela-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>CNPJ</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="listaContas">
                        </tbody>
                    </table>
                </div>
                <button onclick="restaurarPadrao()" style="margin-top: 20px; background-color: #6c757d; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem;">
                    Restaurar Configuração Original
                </button>
            </div>
        </section>
    </main>
    <script src="cadastro.js"></script>
</body>

</html>
