<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main class="conteudo-site">
        <aside class="boas-vindas">
            <h1>Seja <br> Bem-Vindo.</h1>
            <p>Acesse o site com sua conta cadastrada</p>
            <button>Entrar</button>
        </aside>
        <section class="form-cadastro">
            <p><a href="#">Mudar para versao empresarial</a></p>
            <p><a href="#">Mudar para versao prefeitura</a></p>
            <div class="formulario">
                <h2>Crie sua conta</h2>
                <form id="formCadastro">
                    <div>
                        <label for="nome">Nome Completo:</label>
                        <input type="text" id="nome" name ="nome" placeholder="Ex: João da Silva" required>
                    </div>
                    <div>
                        <label for="email">Email:</label>
                        <input type="email" id="email" name ="email" placeholder="email@exemplo.com" required>
                    </div>
                    <div>
                        <label for="cpf">CPF:</label>
                        <input type="text" id="cpf" name ="cpf" placeholder="000.000.000-00" required>
                    </div>
                    <div>
                        <label for="senha">Senha:</label>
                        <input type="password" id="senha" name ="senha" placeholder="Digite sua senha" required>
                    </div>
                    <div>
                        <label for="senha">Confirme sua senha:</label>
                        <input type="password" id="senha" name ="senha" placeholder="Confrime sua senha" required>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
