<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Informações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="mb-4">Editar Informações</h1>
    <main>
        <div class="row g-4">
             <div class="col-8">
                <div class="card">
                    <div class="card-titulo">
                        1. Nota
                    </div>
                    <textarea placeholder="Escreva uma nota para acrescentar à descrição..."></textarea>
                </div>
             </div>
             
            <div class="col-4">
                <div class="card">
                    <div class="card-titulo">3. Custo estimado</div>
                    <label>Valor:</label>
                    <input type="text" placeholder="R$0,00">
                    <label for="">Descrição:</label>
                    <input type="text" placeholder="Insira uma descrição...">
                </div>
            </div>

            <div class="col-8">
                <div class="card"> 
                    <div class="card-titulo">2. Checkpoints</div>
                    <ul>
                        <li><input type="checkbox">Denúncia aceita</li>
                        <li><input type="checkbox">Equipe enviada ao local</li>
                        <li><input type="checkbox">Planejamento e previsões</li>
                        <li><input type="checkbox">Manutenção em andamento</li>
                        <li><input type="checkbox">Obra finalizada</li>
                    </ul>
                    <button>Adicionar Checkpoint</button>
                </div>                
            </div>



            <div class="col-4">
                <div class="card h-100">
                    <div class="card-titulo">Prazo estimado</div>
                    <div class="card-body">
                        <input type="date" class="form-control">
                    </div>
                </div>
            </div>

        </div>
        <div class="d-flex justify-content-end mt-4">
            <button class="btn btn-danger px-5">Salvar</button>
        </div>
    </main>
</body>
</html>
