<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/../../assets/css/cadastro.css">
    <title>Cadastro Empresa | Zella</title>
</head>

<body>
    <main class="conteudo-site">
        <aside class="boas-vindas">
            <h1>Seja <br> Bem-Vindo.</h1>
            <p>Acesse o site com sua conta cadastrada</p>
            <button id="entrar" class="btn-entrar">Entrar</button>
        </aside>
        <section class="main-content">
            <div class="trocar-tipo">
                <p><a href="cadastroUsuario.html">Mudar para versão do usuário</a></p>
                <p><a href="cadastroPrefeitura.html">Mudar para versão da prefeitura</a></p>
            </div>
            <div class="formulario">
                <h2 id="tituloFormulario">Crie sua conta</h2>
                <form id="formCadastro">
                    <input type="hidden" id="idEdicao">
                    <div>
                        <label for="nome">Razão Social / Nome Completo:</label> <br>
                        <input type="text" id="nome" name="nome" placeholder="Ex: João da Silva Ltda" required>
                    </div>
                    <div>
                        <label for="nomeExibicao">Nome de Exibição da Empresa:</label> <br>
                        <input type="text" id="nomeExibicao" name="nomeExibicao" placeholder="Ex: Oficina do João" required>
                    </div>
                    <div>
                        <label for="email">Email:</label> <br>
                        <input type="email" id="email" name="email" placeholder="email@exemplo.com" required>
                    </div>
                    <div>
                        <label for="identificador">CNPJ:</label> <br>
                        <input type="text" id="identificador" name="cnpj" placeholder="00.000.000/0000-00" required>
                    </div>
                    <div>
                        <label for="cpfResponsavel">CPF do Responsável:</label> <br>
                        <input type="text" id="cpfResponsavel" name="cpfResponsavel" placeholder="Digite o CPF de quem vai acessar" required>
                    </div>
                    <div>
                        <label for="senha">Senha:</label> <br>
                        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                    </div>
                    <div>
                        <label for="confirmarSenha">Confirme sua senha:</label> <br>
                        <input type="password" id="confirmarSenha" name="confirmeSenha" placeholder="Confirme sua senha" required>
                    </div>
                    <button type="submit">Cadastrar</button>
                </form>
            </div>

            
        </section>
    </main>
    <script src="./../../assets/js/cadastro.js"></script>
</body>

</html>
