<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="./../../../assets/css/styles.css">
    <title>Zella - Nova Denúncia</title>
</head>

<body>
<main class="container py-4">
    <h1 class="mb-4">Nova denúncia</h1>
    <form id="formDenuncia">

        <div class="row g-4">

            <div class="col-lg-8">

                <div class="card shadow-sm">
                    <div class="card-header bg-gradient text-white">
                        1 - Fotos do problema
                    </div>

                    <div class="card-body">

                        <div class="d-flex align-items-center gap-2">

                            <button type="button" class="btn btn-dark btn-sm" id="setaEsq">◀</button>

                            <div class="flex-grow-1 overflow-hidden">
                                <div class="d-flex gap-3" id="carrosselTrack">

                                    <label for="inputFotos" class="btn-adicionar">
                                        <span>+</span>
                                        Adicionar
                                    </label>

                                    <div id="fotosContainer"></div>

                                </div>
                            </div>

                            <button type="button" class="btn btn-dark btn-sm" id="setaDir">▶</button>

                        </div>

                        <input type="file" id="inputFotos" class="d-none" multiple>

                    </div>
                </div>

                <div class="card shadow-sm mt-4">
                    <div class="card-header bg-gradient text-white">
                        2 - Descrição da denúncia
                    </div>

                    <div class="card-body">
                        <textarea id="descricao" class="form-control" rows="4" placeholder="Descreva o problema..."></textarea>
                    </div>
                </div>

            </div>

            <div class="col-lg-4">

                <div class="card shadow-sm">
                    <div class="card-header bg-gradient text-white">
                        3 - Informações
                    </div>

                    <div class="card-body">

                        <label class="form-label">Categoria</label>
                        <select id="categoria" class="form-select mb-3">
                            <option value="">Selecione</option>
                            <option value="buraco">Buraco na via</option>
                            <option value="esgoto">Esgoto</option>
                            <option value="deslizamento">Deslizamento</option>
                            <option value="limpeza">Limpeza</option>
                            <option value="iluminacao">Falta de iluminação</option>
                        </select>

                        <label class="form-label">Localização</label>
                        <textarea id="localizacao" class="form-control mb-3"></textarea>

                        <label class="form-label">Urgência</label>
                        <select id="urgencia" class="form-select mb-3">
                            <option value="">Selecione</option>
                            <option value="alta">Alta</option>
                            <option value="media">Média</option>
                            <option value="baixa">Baixa</option>
                        </select>

                        <label class="form-label">Entidade Relacionada</label>
                        <select id="entidade" class="form-select mb-3">
                            <option value="">Selecione</option>
                            <option value="todos">Todos</option>
                            <option value="prefeitura">Prefeitura</option>
                            <option value="empresa">Empresa Privada</option>
                        </select>
                        </select>

                        <button class="btn btn-dark w-100">
                            Publicar denúncia
                        </button>

                    </div>
                </div>

            </div>

        </div>

    </form>

    <div id="mensagemGlobal" class="mt-3"></div>

</main>

<script src="./../../../assets/js/script.js"></script>
</body>
</html>
