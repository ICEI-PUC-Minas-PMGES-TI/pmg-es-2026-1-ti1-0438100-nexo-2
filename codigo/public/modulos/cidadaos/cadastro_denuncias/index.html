<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="./../../../assets/css/styles.css">
    <title>Zella - Nova Denúncia</title>
</head>

<body>
    <main class="container py-4">
        <h1 class="mb-4">Nova denúncia</h1>
        <form id="formDenuncia">

            <div class="row g-4">

                <div class="col-lg-8 ">

                    <div class="card shadow-sm" style="height: 300px;">
                        <div class="card-header bg-gradient text-white fw-bold fs-5">
                            1 - Fotos do problema
                        </div>

                        <div class="card-body p-4">

                            <div class="d-flex align-items-center gap-2 mt-4">

                                <button type="button" class="btn btn-dark btn-sm" id="setaEsq">◀</button>

                                <div class="flex-grow-1 overflow-hidden">
                                    <div class="d-flex gap-3" id="carrosselTrack">

                                        <label for="inputFotos" class="btn-adicionar">
                                            <span>+</span>
                                            Adicionar
                                        </label>

                                        <div id="fotosContainer"></div>

                                    </div>
                                </div>

                                <button type="button" class="btn btn-dark btn-sm" id="setaDir">▶</button>

                            </div>

                            <input type="file" id="inputFotos" class="d-none" multiple>

                        </div>
                    </div>

                    <div class="card shadow-sm mt-4" style="height: 450px;">
                        <div class="card-header bg-gradient text-white fw-bold fs-5">
                            2 - Descrição da denúncia
                        </div>

                        <div class="card-body p-4">
                            <textarea id="descricao" class="form-control fs-5" rows="11"
                                placeholder="Descreva o problema..." style=" overflow: auto;"></textarea>
                        </div>
                    </div>

                </div>

                <div class="col-lg-4">

                    <div class="card shadow-sm">
                        <div class="card-header bg-gradient text-white fw-bold fs-5">
                            3 - Informações
                        </div>

                        <div class="card-body">

                            <label class="form-label">Categoria</label>
                            <select id="categoria" class="form-select mb-3">
                                <option value="">Carregando...</option>
                            </select>

                            <label class="form-label">Localização no mapa</label>
                            <div id="mapa" style="height: 140px; margin-bottom: 12px; border-radius: 8px;"></div>

                            <div class="input-group mb-3">
                                <input type="text" id="searchEndereco" class="form-control"
                                    placeholder="Digite um endereço, bairro, cidade...">
                                <button class="btn btn-secondary" type="button" id="btnBuscar">Buscar</button>
                            </div>

                            <input type="hidden" id="lat" value="">
                            <input type="hidden" id="lng" value="">

                            <textarea id="localizacao" class="form-control mb-3" rows="2"
                                placeholder="Endereço selecionado aparecerá aqui" readonly></textarea>

                            <label class="form-label">Urgência</label>
                            <select id="urgencia" class="form-select mb-3">
                                <option value="">Carregando...</option>
                            </select>

                            <label class="form-label">Entidade Relacionada</label>
                            <select id="entidade" class="form-select mb-3">
                                <option value="">Carregando...</option>
                            </select>

                            <button class="btn btn-dark w-100" type="submit">Publicar denúncia</button>

                        </div>
                    </div>

                </div>

            </div>

        </form>

        <div id="mensagemGlobal" class="mt-3"></div>


        <div class="container mt-5">

            <h2>Denúncias cadastradas</h2>

            <table class="table table-striped">

                <thead>
                    <tr>
                        <th>Categoria</th>
                        <th>Local</th>
                        <th>Entidade Relacionada</th>
                        <th>Data</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="tabelaDenuncias"></tbody>

            </table>

        </div>
    </main>



    <script src="./../../../assets/js/script.js"></script>
</body>

</html>
